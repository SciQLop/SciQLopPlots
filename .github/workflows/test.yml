name: Tests

on: [push, pull_request]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: pip install pytest numpy

      - name: Run unit tests
        working-directory: tests/unit
        run: PYTHONPATH=../../SciQLopPlots pytest -v

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libgl1-mesa-glx libgl-dev ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-integration-${{ hashFiles('src/**', 'include/**', 'meson.build') }}
          restore-keys: ccache-integration-

      - name: Install package
        run: |
          export CC="ccache gcc" CXX="ccache g++"
          pip install ".[test]"

      - name: Run integration tests
        run: xvfb-run --auto-servernum pytest tests/integration/ -v --timeout=60
